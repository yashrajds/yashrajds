<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Yashraj Deshmukh profile banner</title>
  <desc id="desc">A personal editorial profile banner with soft paper texture, pink initials, black print shapes, and minimal name typography.</desc>
  <defs>
    <pattern id="paper" width="96" height="96" patternUnits="userSpaceOnUse">
      <rect width="96" height="96" fill="#fff8f3"/>
      <circle cx="16" cy="24" r="0.8" fill="#111111" opacity="0.055"/>
      <circle cx="58" cy="14" r="0.7" fill="#111111" opacity="0.04"/>
      <circle cx="82" cy="71" r="0.9" fill="#111111" opacity="0.04"/>
      <circle cx="30" cy="82" r="0.7" fill="#f36b98" opacity="0.12"/>
      <path d="M0 49H96M41 0V96" stroke="#111111" stroke-opacity="0.012"/>
    </pattern>
    <filter id="rough" x="-12%" y="-12%" width="124%" height="124%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" seed="27" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.1"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111111" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#paper)"/>
  <rect width="1200" height="360" fill="#fff8f3" opacity="0.5"/>

  <g opacity="0.76" filter="url(#rough)">
    <text x="42" y="236" fill="#f36b98" fill-opacity="0.38" font-family="Impact, Arial Black, Arial, sans-serif" font-size="178" font-weight="900" letter-spacing="-12">YD</text>
    <rect x="861" y="0" width="54" height="360" fill="#111111" fill-opacity="0.78"/>
    <rect x="820" y="168" width="236" height="43" fill="#111111" fill-opacity="0.83"/>
    <rect x="861" y="227" width="162" height="39" fill="#111111" fill-opacity="0.83"/>
    <rect x="957" y="-14" width="272" height="38" transform="rotate(90 957 -14)" fill="#111111" fill-opacity="0.72"/>
  </g>

  <g transform="translate(292 -28) rotate(72)" opacity="0.35" filter="url(#softShadow)">
    <rect width="160" height="96" fill="#fffdf9" stroke="#111111" stroke-opacity="0.14"/>
    <g font-family="Georgia, serif" font-size="8" fill="#111111" opacity="0.48">
      <text x="14" y="22">ideas sketches prototypes build notes</text>
      <text x="14" y="38">interfaces systems automation craft</text>
      <text x="14" y="54">learn fast make useful things</text>
      <text x="14" y="70">code design ship repeat</text>
    </g>
  </g>

  <g transform="translate(575 26) rotate(-12)" opacity="0.7" filter="url(#softShadow)">
    <rect x="0" y="0" width="156" height="68" fill="#fffdf9"/>
    <path d="M20 43C48 10 78 9 107 42" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
    <path d="M43 30L58 20M84 20L99 30" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
    <path d="M29 52C56 63 84 63 113 52" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g transform="translate(36 8)" stroke="#111111" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.72">
    <path d="M12 10C28 45 62 44 76 12"/>
    <path d="M44 0C32 28 33 55 45 78"/>
    <path d="M0 40C28 29 56 30 88 42"/>
    <path d="M18 73C43 53 63 54 85 73"/>
  </g>

  <g transform="translate(470 225)">
    <path d="M0 0H310" stroke="#111111" stroke-opacity="0.24" stroke-width="2"/>
    <text x="0" y="34" fill="#111111" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="900" letter-spacing="7">YASHRAJ DESHMUKH</text>
    <text x="2" y="64" fill="#111111" opacity="0.62" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="4">BUILD / DESIGN / CREATE</text>
  </g>

  <g transform="translate(420 188) rotate(-9)">
    <polygon points="0,19 21,0 49,7 55,38 29,54 4,43" fill="#f36b98" fill-opacity="0.72"/>
    <path d="M17 30L24 18L33 33L43 22" stroke="#111111" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <path d="M0 284C142 241 266 249 392 282C580 330 749 294 905 242C1018 205 1110 207 1200 229" stroke="#111111" stroke-opacity="0.18" stroke-width="1.4"/>
  <path d="M92 144H248M92 158H202M930 286H1140M954 304H1088" stroke="#111111" stroke-opacity="0.18" stroke-width="1.4"/>
</svg>
