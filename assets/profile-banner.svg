<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Yashraj Deshmukh GitHub profile banner</title>
  <desc id="desc">A cinematic monochrome AI systems banner with subtle grids, orbital interface lines, and profile title text.</desc>
  <defs>
    <radialGradient id="orbGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(824 168) rotate(118) scale(300 430)">
      <stop stop-color="#FFFFFF" stop-opacity="0.26"/>
      <stop offset="0.42" stop-color="#BFC7D5" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="180" y1="43" x2="1015" y2="314" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F5F5"/>
      <stop offset="0.48" stop-color="#8C8C8C"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <pattern id="microGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="1"/>
      <circle cx="0" cy="0" r="1.2" fill="#FFFFFF" fill-opacity="0.07"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <filter id="textGlow" x="-10%" y="-50%" width="120%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="#070707"/>
  <rect width="1200" height="360" fill="url(#microGrid)"/>
  <rect width="1200" height="360" fill="url(#orbGlow)"/>
  <path d="M0 307C170 247 290 270 438 294C610 322 750 302 902 242C1024 194 1112 171 1200 191V360H0V307Z" fill="#FFFFFF" fill-opacity="0.035"/>
  <path d="M0 70C149 112 318 119 485 86C667 51 794 41 948 69C1041 86 1133 104 1200 98" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <g filter="url(#softShadow)">
    <rect x="62" y="52" width="1076" height="256" rx="0" fill="#0E0E0E" fill-opacity="0.64" stroke="#F5F5F5" stroke-opacity="0.18"/>
    <path d="M87 84H232" stroke="#F5F5F5" stroke-opacity="0.58"/>
    <path d="M968 276H1113" stroke="#F5F5F5" stroke-opacity="0.58"/>
  </g>

  <g transform="translate(814 178)" stroke="#FFFFFF" stroke-linecap="round">
    <circle r="95" stroke-opacity="0.12"/>
    <circle r="67" stroke-opacity="0.2"/>
    <circle r="34" stroke-opacity="0.34"/>
    <path d="M-95 0A95 95 0 0 1-16-94" stroke-opacity="0.62" stroke-width="2"/>
    <path d="M67 0A67 67 0 0 1 13 66" stroke-opacity="0.54" stroke-width="2"/>
    <path d="M-33 6A34 34 0 0 1 21-27" stroke-opacity="0.78" stroke-width="2"/>
    <path d="M-143-14H-104" stroke-opacity="0.28"/>
    <path d="M104 37H154" stroke-opacity="0.28"/>
    <path d="M-12-132V-101" stroke-opacity="0.2"/>
    <path d="M8 101V137" stroke-opacity="0.2"/>
    <circle r="7" fill="#FFFFFF" fill-opacity="0.84" stroke="none"/>
  </g>

  <g opacity="0.56">
    <rect x="110" y="218" width="128" height="34" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <rect x="252" y="218" width="86" height="34" fill="#FFFFFF" fill-opacity="0.025" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <rect x="352" y="218" width="152" height="34" fill="#FFFFFF" fill-opacity="0.025" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <path d="M122 234H208" stroke="#FFFFFF" stroke-opacity="0.72"/>
    <path d="M264 234H305" stroke="#FFFFFF" stroke-opacity="0.42"/>
    <path d="M365 234H467" stroke="#FFFFFF" stroke-opacity="0.34"/>
  </g>

  <text x="110" y="134" fill="#B8B8B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" letter-spacing="7">
    LOCAL-FIRST AI / COMPUTER VISION / DESKTOP SYSTEMS
  </text>
  <text x="108" y="196" fill="url(#metal)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="-2" filter="url(#textGlow)">
    Yashraj Deshmukh
  </text>
  <text x="112" y="279" fill="#DADADA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" letter-spacing="1.4">
    Building intelligent interfaces, voice assistants, automation tools, and perception-driven software.
  </text>

  <g fill="#F5F5F5" fill-opacity="0.5" font-family="Consolas, 'Courier New', monospace" font-size="13">
    <text x="945" y="102">STATUS: ONLINE</text>
    <text x="945" y="126">MODE: BUILD</text>
    <text x="945" y="150">FOCUS: ORION</text>
  </g>
</svg>
